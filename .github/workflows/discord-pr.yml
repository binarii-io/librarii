name: Discord — PR Notifications

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    if: github.repository == 'binarii-io/librarii'
    runs-on: ubuntu-latest
    steps:
      - name: PR Opened
        if: github.event.action == 'opened'
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: "New PR: ${{ github.event.pull_request.title }}"
          embed-url: ${{ github.event.pull_request.html_url }}
          embed-description: |
            **${{ github.repository }}#${{ github.event.pull_request.number }}** by ${{ github.event.pull_request.user.login }}
            `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`
          embed-color: 3447003

      - name: PR Merged
        if: github.event.action == 'closed' && github.event.pull_request.merged
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: "Merged: ${{ github.event.pull_request.title }}"
          embed-url: ${{ github.event.pull_request.html_url }}
          embed-description: |
            **${{ github.repository }}#${{ github.event.pull_request.number }}** merged by ${{ github.event.pull_request.merged_by.login }}
          embed-color: 3066993
